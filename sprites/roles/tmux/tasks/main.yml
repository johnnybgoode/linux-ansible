---
- name: Install tmux
  apt:
    name: tmux
    state: present

# Only writes a minimal tmux.conf if one doesn't already exist.
- name: Write base tmux.conf (skipped if already present)
  copy:
    dest: "{{ target_home }}/.tmux.conf"
    force: false
    owner: "{{ target_user }}"
    mode: "0644"
    content: |
      # use C-a as prefix
      unbind C-b
      set -g prefix C-a
      bind C-a send-prefix

      # true colour support
      set -g default-terminal "tmux-256color"
      set -sa terminal-overrides ",*256col*:Tc"   # set -ga terminal-overrides ",*256col*:RGB"

      # Enable italics
      # set -ga terminal-overrides ",*:sitm=\E[3m"

      # UTF-8
      set -q -g utf8 on
      setw -q -g utf8 on
      set -gq status-utf8 on

      # start windows and panes at 1
      set -g base-index 1
      setw -g pane-base-index 1
      set -g renumber-windows on

      # increase scrollback
      set -g history-limit 20000

      # Faster escape sequences (helps with responsive UI)
      set -sg escape-time 0

      # mouse support
      set -g mouse on

      # don't rename windows automatically
      set -g allow-rename off

      # Aggressive resize — use largest client per-window, not per-session
      set -g aggressive-resize on

      # Pass focus events through (helps apps detect focus)
      set -g focus-events on

      # reload config
      bind r source-file ~/.tmux.conf \; display "Reloaded"
