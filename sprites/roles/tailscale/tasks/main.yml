- name: Add Tailscale GPG key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/ubuntu/questing.noarmor.gpg
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"
  retries: 6
  delay: 10
  register: ts_gpg
  until: ts_gpg is success

- name: Add Tailscale apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/tailscale.list
    content: |
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu questing main
    mode: "0644"

- name: Install Tailscale
  ansible.builtin.apt:
    name:
      - tailscale
      - tailscale-archive-keyring
    state: present
    update_cache: true

- name: Start tailscaled
  ansible.builtin.shell: |
    if pgrep -x tailscaled > /dev/null; then
      echo "already running"
    else
      tailscaled --state=/var/lib/tailscale/tailscaled.state --socket=/run/tailscale/tailscaled.sock &
      sleep 2
    fi
  changed_when: "'already running' not in tailscaled_start.stdout"
  register: tailscaled_start

- name: Bring up Tailscale with sprite tag
  ansible.builtin.command: >
    tailscale up
    --auth-key={{ vault_tailscale_authkey }}
    --advertise-tags=tag:sprite
    --ssh
  become: true

- name: Verify Tailscale is connected
  ansible.builtin.command: tailscale status
  changed_when: false
