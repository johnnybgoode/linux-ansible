---
- name: Write project secrets to ~/.env
  ansible.builtin.copy:
    dest: "{{ target_home }}/.env"
    mode: "0600"
    content: |
      export ANTHROPIC_API_KEY="{{ vault_anthropic_api_key }}"
      export GEMINI_API_KEY="{{ vault_gemini_api_key }}"
      export GH_TOKEN="{{ vault_github_token }}"
      export OPEN_AI_API_KEY="{{ vault_open_ai_api_key }}"

- name: Ensure ~/.env is sourced from ~/.bashrc
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.bashrc"
    line: '[ -f "$HOME/.env" ] && source "$HOME/.env"'
    state: present

- name: Ensure ~/.env is sourced from ~/.zshrc
  ansible.builtin.lineinfile:
    path: "{{ target_home }}/.zshrc"
    line: '[ -f "$HOME/.env" ] && source "$HOME/.env"'
    state: present
