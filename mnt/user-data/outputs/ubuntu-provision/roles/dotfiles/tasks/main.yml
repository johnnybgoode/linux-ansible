---
- name: Get real user home directory
  getent:
    database: passwd
    key: "{{ ansible_user_id }}"
  register: user_info

- name: Set user home fact
  set_fact:
    real_user_home: "{{ user_info.ansible_facts.getent_passwd[ansible_user_id][4] }}"

- name: Create ~/.skel directory
  file:
    path: "{{ real_user_home }}/.skel"
    state: directory
    owner: "{{ ansible_user_id }}"
    mode: '0755'

- name: Clone dotfiles repo
  become: false
  git:
    repo: https://github.com/johnnybgoode/dotfiles.git
    dest: "{{ real_user_home }}/.skel/dotfiles"
    update: true

- name: Clone vimfiles repo
  become: false
  git:
    repo: https://github.com/johnnybgoode/vimfiles.git
    dest: "{{ real_user_home }}/.skel/vimfiles"
    update: true

- name: Run dotfiles move-in.sh
  become: false
  shell: bash move-in.sh
  args:
    chdir: "{{ real_user_home }}/.skel/dotfiles"
    executable: /bin/bash

- name: Run vimfiles move-in.sh
  become: false
  shell: bash move-in.sh
  args:
    chdir: "{{ real_user_home }}/.skel/vimfiles"
    executable: /bin/bash
