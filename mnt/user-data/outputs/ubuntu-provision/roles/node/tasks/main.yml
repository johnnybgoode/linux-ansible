---
# nvm must be installed and used as the non-root user, so these tasks
# drop privileges to ansible_user_id for all nvm-related steps.

- name: Get real user home directory
  getent:
    database: passwd
    key: "{{ ansible_user_id }}"
  register: user_info

- name: Set user home fact
  set_fact:
    real_user_home: "{{ user_info.ansible_facts.getent_passwd[ansible_user_id][4] }}"

- name: Install nvm
  become: false
  shell: |
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
  args:
    creates: "{{ real_user_home }}/.nvm/nvm.sh"

- name: Install Node.js LTS via nvm
  become: false
  shell: |
    export NVM_DIR="{{ real_user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    nvm install --lts
    nvm alias default lts/*
  args:
    executable: /bin/bash

- name: Install Claude Code globally
  become: false
  shell: |
    export NVM_DIR="{{ real_user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    npm install -g @anthropic-ai/claude-code
  args:
    executable: /bin/bash
