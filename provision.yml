---
- name: Provision Ubuntu server
  hosts: localhost
  connection: local
  become: true

  vars:
    # lookup('env', ...) reads from the controller process (the user who
    # ran ansible-playbook), so it resolves to the real unprivileged user
    # even though become: true elevates tasks to root.
    target_user: "{{ lookup('env', 'USER') }}"
    target_home: "{{ lookup('env', 'HOME') }}"

  vars_files:
    - group_vars/vault.yml

  roles:
    - base
    - ssh
    - tailscale
    - node
    - tmux
    - dotfiles
