---
- name: Install tmux
  apt:
    name: tmux
    state: present

# Only writes a minimal tmux.conf if one doesn't already exist.
# The dotfiles role may overwrite this later.
- name: Write base tmux.conf (skipped if already present)
  copy:
    dest: "{{ target_home }}/.tmux.conf"
    force: false
    owner: "{{ target_user }}"
    mode: '0644'
    content: |
      # use C-a as prefix
      unbind C-b
      set -g prefix C-a
      bind C-a send-prefix

      # true colour support
      set -g default-terminal "tmux-256color"
      set -sa terminal-overrides ",*256col*:Tc"

      # UTF-8
      set -q -g utf8 on
      setw -q -g utf8 on

      # start windows and panes at 1
      set -g base-index 1
      setw -g pane-base-index 1
      set -g renumber-windows on

      # increase scrollback
      set -g history-limit 10000

      # mouse support
      set -g mouse on

      # don't rename windows automatically
      set -g allow-rename off

      # reload config
      bind r source-file ~/.tmux.conf \; display "Reloaded"
