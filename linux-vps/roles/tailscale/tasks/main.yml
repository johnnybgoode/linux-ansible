---
- name: Add Tailscale GPG key
  get_url:
    url: "https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: '0644'

- name: Add Tailscale apt repository
  apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg]
      https://pkgs.tailscale.com/stable/ubuntu {{ ansible_distribution_release }} main
    filename: tailscale
    state: present

- name: Install Tailscale
  apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable and start tailscaled
  systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Authenticate with Tailscale
  command: tailscale up --authkey={{ vault_tailscale_authkey }} --ssh
  no_log: true
  register: tailscale_up
  changed_when: tailscale_up.rc == 0
  failed_when: tailscale_up.rc != 0
